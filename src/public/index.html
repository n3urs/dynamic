<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoulderRyn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex overflow-hidden">

  <!-- PIN Challenge Modal -->
  <div id="pin-challenge-overlay" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center">
    <div class="w-full max-w-xs mx-4">
      <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700">
        <div class="text-center mb-2">
          <p id="pin-challenge-title" class="text-white font-semibold">Enter Staff PIN</p>
          <p id="pin-challenge-desc" class="text-slate-400 text-xs mt-1"></p>
        </div>
        <div class="flex justify-center gap-4 my-6" id="challenge-pin-dots">
          <div class="w-5 h-5 rounded-full border-2 border-slate-500 transition-all duration-150"></div>
          <div class="w-5 h-5 rounded-full border-2 border-slate-500 transition-all duration-150"></div>
          <div class="w-5 h-5 rounded-full border-2 border-slate-500 transition-all duration-150"></div>
          <div class="w-5 h-5 rounded-full border-2 border-slate-500 transition-all duration-150"></div>
        </div>
        <div id="challenge-pin-error" class="text-red-400 text-sm text-center mb-3 h-5"></div>
        <div id="challenge-pin-staff" class="text-center mb-3 h-6"></div>
        <div class="grid grid-cols-3 gap-2 max-w-[240px] mx-auto">
          <button onclick="challengePinPress('1')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">1</button>
          <button onclick="challengePinPress('2')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">2</button>
          <button onclick="challengePinPress('3')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">3</button>
          <button onclick="challengePinPress('4')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">4</button>
          <button onclick="challengePinPress('5')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">5</button>
          <button onclick="challengePinPress('6')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">6</button>
          <button onclick="challengePinPress('7')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">7</button>
          <button onclick="challengePinPress('8')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">8</button>
          <button onclick="challengePinPress('9')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">9</button>
          <button onclick="challengePinClear()" class="h-14 rounded-xl bg-slate-700/50 hover:bg-slate-600 text-slate-300 text-xs font-medium transition select-none">Clear</button>
          <button onclick="challengePinPress('0')" class="h-14 rounded-xl bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white text-xl font-semibold transition-all duration-100 select-none">0</button>
          <button onclick="challengePinBackspace()" class="h-14 rounded-xl bg-slate-700/50 hover:bg-slate-600 text-slate-300 transition select-none flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414-6.414A2 2 0 0110.828 5H21a1 1 0 011 1v12a1 1 0 01-1 1H10.828a2 2 0 01-1.414-.586L3 12z"/></svg>
          </button>
        </div>
        <div class="mt-4 text-center">
          <button onclick="cancelPinChallenge()" class="text-slate-400 hover:text-white text-sm transition">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- First Run Setup Overlay (only shown if no staff exist) -->
  <div id="first-run-overlay" class="fixed inset-0 z-[100] bg-slate-900 hidden flex items-center justify-center">
    <div id="first-run-container" class="w-full max-w-sm mx-4">
    </div>
  </div>

  <!-- Sidebar Navigation -->
  <aside id="sidebar" class="w-64 bg-slate-800 text-white flex flex-col flex-shrink-0">
    <!-- Logo / Brand -->
    <div class="p-5 border-b border-slate-700">
      <h1 class="text-xl font-bold tracking-tight">BoulderRyn</h1>
      <p class="text-xs text-slate-400 mt-1">Gym Management</p>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 py-4 overflow-y-auto">
      <ul class="space-y-1 px-3" id="nav-links">
        <li>
          <a href="#" data-page="dashboard" class="nav-link active">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span>Visitors</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="checkin" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            <span>Check In</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="members" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <span>Members</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="pos" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
            <span>Point of Sale</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="events" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span>Events</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="routes" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            <span>Routes</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="analytics" data-pin-required="analytics" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span>Analytics</span>
          </a>
        </li>
        <li>
          <a href="#" data-page="staff" data-pin-required="settings" class="nav-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span>Settings</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-slate-700 text-xs text-slate-500">
      <p>BoulderRyn v0.1.0</p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main id="content" class="flex-1 overflow-y-auto">
    <div id="page-container" class="p-6">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-checkin" class="page hidden"></div>
      <div id="page-members" class="page hidden"></div>
      <div id="page-pos" class="page hidden"></div>
      <div id="page-events" class="page hidden"></div>
      <div id="page-routes" class="page hidden"></div>
      <div id="page-analytics" class="page hidden"></div>
      <div id="page-staff" class="page hidden"></div>
    </div>
  </main>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
    <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <!-- Scripts -->
  <script src="pages/pos.js"></script>
  <script src="pages/waiver.js"></script>
  <script src="app.js"></script>
</body>
</html>
